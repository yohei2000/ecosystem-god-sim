<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101810" />
    <title>Ecosystem God Sim</title>
  </head>
  <body>
    <main id="app">
      <section id="hud" aria-label="ecosystem status">
        <div class="metric"><span>草量</span><strong id="grassMetric">0</strong></div>
        <div class="metric"><span>草食</span><strong id="herbivoreMetric">0</strong></div>
        <div class="metric"><span>肉食</span><strong id="carnivoreMetric">0</strong></div>
        <div class="metric"><span>安定度</span><strong id="stabilityMetric">0%</strong></div>
      </section>
      <section id="logPanel" aria-label="event log">
        <h1>Ecosystem God Sim</h1>
        <ol id="eventLog"></ol>
      </section>
      <nav id="powerBar" aria-label="god powers">
        <button type="button" class="power-button active" data-power="meteor">隕石</button>
        <button type="button" class="power-button" data-power="rain">雨</button>
        <button type="button" class="power-button" data-power="sun">太陽</button>
        <button type="button" class="power-button" data-power="seed">種追加</button>
      </nav>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
